amcl:
  ros__parameters:
    use_sim_time: False
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "base_link"
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 100.0
    laser_min_range: -1.0
    laser_model_type: "likelihood_field"
    max_beams: 60
    max_particles: 5000  # 脭枚录脫脕拢脳脫脢媒拢篓麓脫2000拢漏拢卢脰搂鲁脰脠芦戮脰露篓脦禄
    min_particles: 1000  # 脭枚录脫脳卯脨隆脕拢脳脫拢篓麓脫500拢漏
    odom_frame_id: "odom"
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.1  # 脝么脫脙驴矛脣脵禄脰赂麓拢篓麓脫0.0拢漏拢卢掳茂脰煤露陋脢搂潞贸脰脴脨脗露篓脦禄
    recovery_alpha_slow: 0.001  # 脝么脫脙脗媒脣脵禄脰赂麓拢篓麓脫0.0拢漏
    resample_interval: 1
    robot_model_type: "nav2_amcl::OmniMotionModel"
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 1.5  # 1.5脙毛脠脻虏卯拢篓脮脹脰脨脰碌拢卢脠脻脠脤脢碌录脢脧碌脥鲁脩脫鲁脵拢漏
    update_min_a: 0.15  # 陆碌碌脥陆脟露脠茫脨脰碌拢篓麓脫0.2拢漏拢卢赂眉脝碌路卤赂眉脨脗
    update_min_d: 0.2   # 陆碌碌脥戮脿脌毛茫脨脰碌拢篓麓脫0.25拢漏
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    scan_topic: scan
    set_initial_pose: true  # 脨猫脪陋鲁玫脢录脦禄脳脣
    always_reset_initial_pose: false  # 虏禄脙驴麓脦脰脴脰脙拢卢卤拢鲁脰露篓脦禄脕卢脨酶脨脭

