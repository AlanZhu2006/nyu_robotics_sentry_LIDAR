bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: False

controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 50.0  # 50Hz脪脭禄帽碌脙赂眉驴矛脧矛脫娄
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001  # 脨脼赂麓拢潞麓脫0.5赂脛脦陋0.001拢卢卤脺脙芒陆脴露脧脣霉脫脨y脣脵露脠
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    # Progress checker parameters
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3
      movement_time_allowance: 15.0
    
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 6.30  # 陆脫陆眉2娄脨拢卢脥锚脠芦潞枚脗脭鲁炉脧貌录矛虏茅
    
    # DWB parameters - optimized for faster response
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: True
      min_vel_x: -0.5   # 脭脢脨铆潞贸脥脣
      min_vel_y: -0.5   # 脭脢脨铆虏脿脪脝
      max_vel_x: 0.5    # 脤谩脣脵碌陆0.5 m/s
      max_vel_y: 0.5    # 脤谩脣脵碌陆0.5 m/s
      max_vel_theta: 0.0  # 陆没脫脙脨媒脳陋拢卢脰禄脫脙 vx vy
      min_speed_xy: 0.0   # 脠脙DWB脳脭脫脡脩隆脭帽脣脵露脠
      max_speed_xy: 0.6   # 脤谩赂脽潞脧鲁脡脣脵露脠碌陆0.6 m/s
      min_speed_theta: 0.0
      acc_lim_x: 2.0      # 脤谩赂脽录脫脣脵露脠
      acc_lim_y: 2.0
      acc_lim_theta: 0.0  # 陆没脫脙脨媒脳陋录脫脣脵露脠
      decel_lim_x: -2.0
      decel_lim_y: -2.0
      decel_lim_theta: 0.0  # 陆没脫脙脨媒脳陋录玫脣脵露脠
      vx_samples: 15      # 录玫脡脵虏脡脩霉脢媒拢卢脣脵露脠赂眉驴矛
      vy_samples: 5
      vtheta_samples: 1   # 脰禄虏脡脩霉 0 脨媒脳陋
      sim_time: 1.5       # 脭枚录脫脭陇虏芒脢卤录盲
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 1.5  # 1.5脙毛脠脻虏卯
      xy_goal_tolerance: 0.25
      trans_stopped_velocity: 0.05  # 陆碌碌脥脥拢脰鹿茫脨脰碌拢篓麓脫0.25拢漏
      short_circuit_trajectory_evaluation: True
      stateful: True
      critics: ["Oscillation", "BaseObstacle", "GoalDist", "PathDist"]  # 录貌禄炉脝脌路脰脝梅
      BaseObstacle.scale: 0.08   # 脭枚录脫脮脧掳颅脦茂脠篓脰脴拢卢赂眉潞脙卤脺脮脧
      GoalDist.scale: 24.0       # 脛驴卤锚戮脿脌毛脠篓脰脴
      PathDist.scale: 32.0       # 脗路戮露赂煤脳脵脠篓脰脴

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 10.0  # 脤谩赂脽碌陆10Hz拢篓麓脫2Hz拢漏
      publish_frequency: 5.0  # 脤谩赂脽碌陆5Hz拢篓麓脫1Hz拢漏
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: False
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.1
      transform_tolerance: 1.5  # 1.5脙毛脠脻虏卯
      robot_radius: 0.22
      plugins: ["voxel_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0   # 脭枚录脫麓煤录脹脣楼录玫脣脵露脠
        inflation_radius: 1.0      # 脭枚录脫脜貌脮脥掳毛戮露拢卢脤谩脟掳卤脺脮脧
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: -1.0
        z_resolution: 0.05
        z_voxels: 100
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /scan
          min_obstacle_height: -2.0
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 4.0
          raytrace_min_range: 0.0
          obstacle_max_range: 3.5
          obstacle_min_range: 0.1
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0  # 脠芦戮脰碌脴脥录驴脡脪脭脗媒脪禄碌茫
      publish_frequency: 0.5
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: False
      transform_tolerance: 1.5  # 1.5脙毛脠脻虏卯
      robot_radius: 0.22
      resolution: 0.1
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          min_obstacle_height: -2.0
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 4.0
          raytrace_min_range: 0.0
          obstacle_max_range: 3.5
          obstacle_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 10.0
        inflation_radius: 0.8
      always_send_full_costmap: True

map_server:
  ros__parameters:
    use_sim_time: False
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: False
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 5.0  # 5Hz脝陆潞芒鹿忙禄庐脰脢脕驴潞脥CPU赂潞脭脴
    use_sim_time: False
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: False
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]  # 卤拢脕么spin碌芦脣脵露脠脦陋0
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 1.5  # 1.5脙毛脠脻虏卯
    use_sim_time: False
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.0  # 陆没脫脙脨媒脳陋
    min_rotational_vel: 0.0  # 陆没脫脙脨媒脳陋
    rotational_acc_lim: 0.0  # 陆没脫脙脨媒脳陋录脫脣脵露脠

robot_state_publisher:
  ros__parameters:
    use_sim_time: False

waypoint_follower:
  ros__parameters:
    use_sim_time: False
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: False
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [0.5, 0.5, 0.0]   # 脤谩脣脵碌陆0.5 m/s
    min_velocity: [-0.5, -0.5, 0.0]
    max_accel: [2.0, 2.0, 0.0]      # 脤谩赂脽录脫脣脵露脠
    max_decel: [-2.0, -2.0, 0.0]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

